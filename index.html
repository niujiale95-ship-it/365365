  <script>
    // 从数组中随机取出指定数量的不重复元素
    function getRandomItems(arr, count) {
      if (count >= arr.length) {
        // 如果需要的数量大于等于数组长度，打乱整个数组后返回
        return shuffleArray([...arr]);
      }
      // 随机取 count 个不重复的元素
      const shuffled = shuffleArray([...arr]);
      return shuffled.slice(0, count);
    }
    
    // Fisher-Yates 随机排序算法
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    // 获取延迟时间（根据索引）
    function getDelayForIndex(index) {
      if (index < DELAY_LIST.length) {
        return DELAY_LIST[index];
      }
      const randomDelays = ["38ms", "42ms", "48ms", "52ms", "58ms", "62ms", "35ms", "40ms", "55ms", "68ms"];
      return randomDelays[index % randomDelays.length];
    }
    
    // 渲染网址列表
    function renderLinks(urls) {
      const container = document.getElementById('randomLinksContainer');
      if (!container) return;
      
      // 清空容器
      container.innerHTML = '';
      
      // 如果没有网址，显示提示
      if (urls.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-500 py-4">暂无网址配置</div>';
        return;
      }
      
      // 随机打乱顺序显示
      const shuffledUrls = shuffleArray([...urls]);
      
      // 循环生成 HTML 结构
      shuffledUrls.forEach((url, idx) => {
        // 如果网址不包含 http:// 或 https://，自动添加 https://
        let fullUrl = url;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          fullUrl = 'https://' + url;
        }
        
        // 提取显示用的域名（去掉协议部分）
        let displayDomain = url;
        if (displayDomain.startsWith('http://')) displayDomain = displayDomain.substring(7);
        if (displayDomain.startsWith('https://')) displayDomain = displayDomain.substring(8);
        if (displayDomain.endsWith('/')) displayDomain = displayDomain.slice(0, -1);
        
        const linkDiv = document.createElement('div');
        linkDiv.className = 'flex items-center justify-between bg-white border rounded-xl shadow-sm p-3 hover:bg-gray-100';
        
        // 左侧延迟标识
        const delaySpan = document.createElement('div');
        delaySpan.className = 'bg-gray-200 text-xs font-bold text-gray-700 px-2 py-1 rounded-md w-14 text-center';
        delaySpan.textContent = getDelayForIndex(idx);
        
        // 中间域名
        const domainDiv = document.createElement('div');
        domainDiv.className = 'flex-1 text-sm font-medium text-gray-800 ml-2 truncate';
        domainDiv.textContent = displayDomain;
        domainDiv.title = displayDomain;
        
        // 右侧按钮链接
        const linkBtn = document.createElement('a');
        linkBtn.href = fullUrl;
        linkBtn.target = '_blank';
        linkBtn.className = 'bg-[#00B56A] text-white text-sm px-3 py-1 rounded-full hover:bg-[#009F5F] flex-shrink-0';
        linkBtn.textContent = '点击进入';
        
        linkDiv.appendChild(delaySpan);
        linkDiv.appendChild(domainDiv);
        linkDiv.appendChild(linkBtn);
        
        container.appendChild(linkDiv);
      });
    }
    
    // 主函数：显示随机网址
    function displayRandomUrls() {
      // 检查是否有网址
      if (URLS_LIST.length === 0) {
        const container = document.getElementById('randomLinksContainer');
        container.innerHTML = '<div class="text-center text-red-500 py-4">❌ 请在 URLS_LIST 中添加网址</div>';
        return;
      }
      
      // 随机取出指定数量的网址
      const selectedUrls = getRandomItems(URLS_LIST, DISPLAY_COUNT);
      
      console.log(`从 ${URLS_LIST.length} 个网址中随机选取了 ${selectedUrls.length} 个`);
      
      // 渲染显示
      renderLinks(selectedUrls);
    }
    
    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
      displayRandomUrls();
    });
  </script>
